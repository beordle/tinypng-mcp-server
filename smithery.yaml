# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - tinyPngApiKey
    properties:
      tinyPngApiKey:
        type: string
        default: your-tinypng-api-key
        description: TinyPNG API Key
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { TINYPNG_API_KEY: config.tinyPngApiKey } })
  exampleConfig:
    tinyPngApiKey: sk_test_12345
